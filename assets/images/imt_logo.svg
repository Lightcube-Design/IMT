<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <!-- Background -->
  <rect width="280" height="280" rx="20" ry="20" fill="#4a5b78"/>

  <!-- Outer border rectangle -->
  <rect x="14" y="14" width="252" height="252" rx="12" ry="12" fill="none" stroke="white" stroke-width="8"/>

  <!-- Eye / wing shape group — centered at y=115 -->
  <!-- Left wing -->
  <path d="M140,85 L30,115 L140,145 Z" fill="white"/>
  <!-- Right wing -->
  <path d="M140,85 L250,115 L140,145 Z" fill="white"/>

  <!-- Center circle (punched out of wings) -->
  <circle cx="140" cy="115" r="38" fill="#4a5b78"/>
  <!-- Circle ring -->
  <circle cx="140" cy="115" r="38" fill="none" stroke="white" stroke-width="7"/>

  <!-- Inner emblem — stylized tulip/leaf (the IMT symbol inside circle) -->
  <!-- Stem -->
  <rect x="137" y="118" width="6" height="22" rx="3" fill="white"/>
  <!-- Left leaf -->
  <path d="M143,132 Q155,110 148,98 Q138,112 143,132" fill="white"/>
  <!-- Right leaf -->
  <path d="M137,132 Q125,110 132,98 Q142,112 137,132" fill="white"/>
  <!-- Top circle of tulip -->
  <circle cx="140" cy="97" r="10" fill="#4a5b78" stroke="white" stroke-width="5"/>

  <!-- IMT Text -->
  <text x="140" y="218" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="62" fill="white" letter-spacing="2">IMT</text>
</svg>
